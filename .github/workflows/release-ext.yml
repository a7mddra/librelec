name: Release Extension
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Build Extension
        run: npm run build:ext

      - name: Zip Extension
        run: |
          cd packages/ext/dist
          zip -r ../../../librelec-extension.zip ./*

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} librelec-extension.zip --title "Release ${{ github.ref_name }}" --notes "Automated release of the librelec Chrome extension."
